<header class="fixed top-0 w-full z-50 bg-emerald-50/80 backdrop-blur-md shadow-sm flex items-center justify-between px-6 h-16">
  <div class="flex items-center gap-4">
    <span class="text-xl font-black text-emerald-950">MarketPay <span class="text-emerald-600">Caja</span></span>
    <div class="hidden md:flex items-center ml-8 space-x-6 h-full text-sm">
      <a class="text-emerald-700 font-bold border-b-2 border-emerald-700 h-16 flex items-center" href="#">Operaciones</a>
      <a class="text-slate-500 font-medium px-3 py-2 rounded-lg hover:bg-emerald-100/50" href="#">Mi Turno</a>
    </div>
  </div>
  <div class="flex items-center space-x-4">
    <div class="h-8 w-8 rounded-full bg-emerald-600 flex items-center justify-center text-white text-xs font-bold border-2 border-emerald-200 shadow-sm">
      N
    </div>
  </div>
</header>

<nav class="hidden md:flex h-screen w-64 fixed left-0 top-0 border-r border-emerald-100 bg-white flex-col py-4 px-4 z-40 mt-16 pb-20">
  <div class="pb-6 mb-6 border-b border-emerald-50">
    <h2 class="text-lg font-bold text-slate-900">Módulo Cajero</h2>
    <p class="text-[10px] font-bold tracking-widest text-emerald-600 uppercase">Terminal de Cobros</p>
  </div>

  <div class="space-y-1 flex-1">
    <a class="flex items-center space-x-3 px-4 py-3 rounded-lg border-l-4 border-emerald-600 text-emerald-700 bg-emerald-50 font-bold text-sm tracking-wide" routerLink="/cajero/inicio">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">point_of_sale</span>
      <span>Inicio Caja</span>
    </a>

    <a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:text-emerald-600 hover:bg-emerald-50/50 font-semibold text-sm tracking-wide" href="#">
      <span class="material-symbols-outlined">person</span>
      <span>Socio</span>
    </a>

    <a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:text-emerald-600 hover:bg-emerald-50/50 font-semibold text-sm tracking-wide" href="#">
      <span class="material-symbols-outlined">storefront</span>
      <span>Puestos</span>
    </a>

    <a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:text-emerald-600 hover:bg-emerald-50/50 font-semibold text-sm tracking-wide" href="#">
      <span class="material-symbols-outlined">account_balance_wallet</span>
      <span>Deudas</span>
    </a>

    <a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:text-emerald-600 hover:bg-emerald-50/50 font-semibold text-sm tracking-wide" href="#">
      <span class="material-symbols-outlined">payments</span>
      <span>Pagos</span>
    </a>
  </div>

  <div class="pt-4 space-y-1 border-t border-emerald-100 mt-auto pb-4">
    <button class="cajero-gradient w-full py-2.5 rounded-md text-white font-bold text-sm mb-2 active:scale-95 transition-all flex items-center justify-center space-x-2 shadow-md shadow-emerald-200">
      <span class="material-symbols-outlined text-sm">add</span>
      <span>Nueva Transacción</span>
    </button>

    <a class="flex items-center space-x-3 px-4 py-2 text-slate-600 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors font-semibold text-sm" href="#">
      <span class="material-symbols-outlined text-xl">contact_support</span>
      <span>Soporte</span>
    </a>

    <a (click)="onLogout()"
       class="cursor-pointer flex items-center space-x-3 px-4 py-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors font-semibold text-sm">
      <span class="material-symbols-outlined text-xl">logout</span>
      <span>Cerrar Turno</span>
    </a>
  </div>
</nav>

<main class="md:ml-64 pt-24 px-6 pb-12 bg-emerald-50/30 min-h-screen">
  <router-outlet></router-outlet>
</main>
