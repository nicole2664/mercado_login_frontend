<main class="login-wrapper">
  <section class="login-visual">
    <div class="visual-overlay"></div>

    <div class="visual-content">
      <div class="visual-logo-box">
        <span class="material-symbols-outlined icon-main">account_balance</span>
      </div>
      <h1 class="visual-title">MarketPay</h1>
      <p class="visual-description">
        Infraestructura de precisión para el ecosistema financiero moderno.
      </p>

      <div class="visual-stats">
        <div class="stat-item">
          <span class="stat-value">99.9%</span>
          <span class="stat-label">Uptime</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">AES-256</span>
          <span class="stat-label">Cifrado</span>
        </div>
      </div>
    </div>
  </section>

  <section class="login-form-container">
    <div class="form-max-width">
      <div class="form-header">
        <span class="label-portal">Portal de Administración</span>
        <h2 class="form-title">Bienvenido de nuevo</h2>
        <p class="form-subtitle">Accede a tu panel de gestión.</p>
      </div>

      <form class="space-y-6">
        <div class="input-group">
          <label class="input-label">Nombre de Usuario</label>
          <input type="text"
                 name="username"
                 [(ngModel)]="loginData.username"
                 class="form-input"
                 placeholder="Usuario">
        </div>

        <div class="input-group">
          <div class="flex justify-between mb-2">
            <label class="input-label">Contraseña</label>
<!--            <a href="#" class="link-forgot">¿Olvidaste tu contraseña?</a>-->
          </div>
          <input type="password"
                 name="password"
                 [(ngModel)]="loginData.password"
                 class="form-input"
                 placeholder="••••••••">
        </div>

        <button (click)="onLogin()" class="btn-login">
          Iniciar sesión
        </button>
      </form>
    </div>
  </section>
</main>
